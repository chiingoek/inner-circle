<style>
    .notif-glow {
        box-shadow: 0 0 15px var(--primary);
        border: 1px solid var(--primary) !important;
        animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
    }
    #dmList {
        margin-top: 20px;
        padding-top: 10px;
        border-top: 1px solid #333;
    }
</style>

<script>
    function launchCircle() {
        document.getElementById('headerInfo').innerText = `${currentUser.name} (${currentUser.role})`;
        
        // Listen for ANY DM sent to YOU to trigger notifications
        rdb.ref('dms').on('child_added', (snap) => {
            const roomID = snap.key;
            if (roomID.includes(currentUser.name)) {
                // Listen for the latest message in that room
                rdb.ref('dms/' + roomID).limitToLast(1).on('child_added', (mSnap) => {
                    const msg = mSnap.val();
                    // If the last message wasn't from me and DM window isn't open for them
                    if (msg.sender !== currentUser.name && activeDMTarget !== msg.sender) {
                        const userEl = document.getElementById('user-' + msg.sender);
                        if (userEl) userEl.classList.add('notif-glow');
                    }
                });
            }
        });

        // Update the User List rendering to include IDs for notifications
        rdb.ref('users').on('value', (snap) => {
            const list = document.getElementById('userList');
            list.innerHTML = '';
            snap.forEach(c => {
                const name = c.key;
                if(name === currentUser.name) return;
                const div = document.createElement('div');
                div.className = 'user-row';
                div.id = 'user-' + name; // ID for notifications
                div.innerHTML = `<div>${name}</div>`;
                
                div.onclick = () => {
                    div.classList.remove('notif-glow');
                    openDM(name);
                };
                list.appendChild(div);
            });
        });

        // ... rest of your public chat listeners
    }
</script>
