<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inner Circle | The Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8a2be2;
            --primary-glow: rgba(138, 43, 226, 0.4);
            --mod: #00ced1;
            --bg: #050505;
            --surface: #111;
            --text: #e0e0e0;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: 'Montserrat', sans-serif;
            background-color: var(--bg); color: var(--text);
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at center, #1a0033 0%, #050505 100%);
        }
        #authOverlay, #kickOverlay, #dmOverlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        .card {
            background: var(--surface); padding: 30px; border-radius: 20px;
            border: 1px solid var(--primary); box-shadow: 0 0 40px var(--primary-glow);
            width: 400px; text-align: center;
        }
        h1, h2 { letter-spacing: 5px; text-transform: uppercase; color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }
        input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px;
            border: 1px solid #333; background: #0a0a0a; color: #fff; transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary); }
        .btn-main {
            background: var(--primary); color: white; width: 100%; padding: 12px;
            margin-top: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
        }
        header { height: 60px; background: rgba(17, 17, 17, 0.9); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid var(--primary); }
        main { display: flex; height: calc(100vh - 60px); }
        #sidebar { width: 300px; background: rgba(10, 10, 10, 0.9); border-right: 1px solid #222; padding: 15px; overflow-y: auto; }
        #chatArea { flex: 1; display: flex; flex-direction: column; }
        #chatContainer, #dmContainer { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Message & Reaction Styles */
        .message { padding: 10px 15px; border-radius: 12px; max-width: 80%; font-size: 0.9em; line-height: 1.4; cursor: pointer; transition: 0.2s; position: relative; }
        .message:hover { filter: brightness(1.2); }
        .msg-Member { background: #222; align-self: flex-start; border-left: 3px solid #444; }
        .msg-Moderator { background: #1a252b; align-self: flex-start; border-left: 3px solid var(--mod); }
        .msg-Admin { background: #251a2b; align-self: flex-start; border-left: 3px solid var(--primary); }
        .msg-me { align-self: flex-end; background: var(--primary); color: white; }
        
        .reaction-drawer { 
            display: none; 
            gap: 10px; 
            background: #000; 
            padding: 5px 10px; 
            border-radius: 20px; 
            border: 1px solid var(--primary);
            position: absolute;
            bottom: -35px;
            left: 10px;
            z-index: 10;
        }
        .message.active-react .reaction-drawer { display: flex; }
        .reaction { cursor: pointer; font-size: 1.1em; transition: 0.2s; }
        .reaction:hover { transform: scale(1.3); }
        .reaction-count-tag { font-size: 0.7em; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 10px; margin-right: 4px; display: inline-block; margin-top: 5px; }

        .user-row { background: #1a1a1a; padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .mod-btn { font-size: 0.6em; padding: 4px 8px; margin-right: 4px; border-radius: 4px; cursor: pointer; border: none; font-weight: bold; color: white; }
        .notif-glow { border-color: var(--primary) !important; box-shadow: 0 0 15px var(--primary-glow); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="card">
        <h1 id="authTitle">Initiation</h1>
        <input type="text" id="userIn" placeholder="Identity (Username)">
        <input type="password" id="passIn" placeholder="Cipher (Password)">
        <button id="mainAuthBtn" class="btn-main">Access The Circle</button>
        <button id="toggleBtn" style="background:none; border:none; color:var(--primary); cursor:pointer; margin-top:10px; font-size:0.8em; text-decoration:underline;">New Initiate? Register</button>
    </div>
</div>

<div id="kickOverlay" style="display:none;">
    <div class="card">
        <h2 style="color:red;">Exiled</h2>
        <p>Your access has been revoked.</p>
        <button id="rejoinBtn" class="btn-main" onclick="requestRejoin()">Request Rejoin</button>
        <p id="requestStatus" style="font-size:0.8em; color:gray; margin-top:10px;"></p>
    </div>
</div>

<div id="dmOverlay" style="display:none;">
    <div class="card" style="width: 500px; height: 600px; display: flex; flex-direction: column;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 id="dmTargetName" style="font-size:0.9em; margin:0;">Secure Link</h2>
            <button onclick="closeDM()" style="background:#444; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:5px;">Close</button>
        </div>
        <div id="dmContainer" style="background:#0a0a0a; border-radius:10px; border:1px solid #333; margin-bottom:15px; padding:15px;"></div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="dmInput" placeholder="Write in shadows..." style="margin:0;">
            <button class="btn-main" style="width:80px; margin:0;" onclick="sendDM()">Send</button>
        </div>
    </div>
</div>

<header>
    <h2>Inner Circle</h2>
    <div id="headerInfo" style="font-size:0.8em; opacity:0.8;"></div>
    <button onclick="location.reload()" style="background:none; color:red; border:1px solid red; padding:5px 10px; border-radius:5px; cursor:pointer;">Logout</button>
</header>

<main>
    <div id="sidebar">
        <h3 style="font-size: 0.65em; color: var(--primary); margin-bottom: 15px; letter-spacing: 2px;">INITIATES (Click to DM)</h3>
        <div id="userList"></div>
    </div>
    <div id="chatArea">
        <div id="chatContainer"></div>
        <div id="inputArea" style="padding:20px; background:#0f0f0f; display:flex; gap:10px; border-top:1px solid #222;">
            <input type="text" id="messageInput" placeholder="Public broadcast..." autocomplete="off" style="margin:0;">
            <button class="btn-main" style="width:100px; margin:0;" id="sendMsgBtn">Send</button>
        </div>
    </div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
window.onload = function() {
    const firebaseConfig = {
        apiKey: "AIzaSyDtGHGk144-eQIllFpwABXk8Ss4FwCgQME",
        authDomain: "circle-38d10.firebaseapp.com",
        databaseURL: "https://circle-38d10-default-rtdb.firebaseio.com",
        projectId: "circle-38d10",
        storageBucket: "circle-38d10.firebasestorage.app",
        messagingSenderId: "122771546745",
        appId: "1:122771546745:web:c766e8da22974e877aeaa8"
    };

    firebase.initializeApp(firebaseConfig);
    const rdb = firebase.database();
    let currentUser = null;
    let isRegisterMode = false;
    let activeDMTarget = null;
    let dmListener = null;

    document.getElementById('toggleBtn').onclick = () => {
        isRegisterMode = !isRegisterMode;
        document.getElementById('authTitle').innerText = isRegisterMode ? "Register" : "Initiation";
        document.getElementById('mainAuthBtn').innerText = isRegisterMode ? "Sign Up" : "Access The Circle";
        document.getElementById('toggleBtn').innerText = isRegisterMode ? "Already an initiate? Login" : "New Initiate? Register";
    };

    document.getElementById('mainAuthBtn').onclick = () => {
        const u = document.getElementById('userIn').value.trim();
        const p = document.getElementById('passIn').value;
        if(!u || !p) return;

        rdb.ref('users/' + u).once('value', (snap) => {
            const data = snap.val();
            if(isRegisterMode) {
                if(data) return alert("Taken.");
                rdb.ref('users/' + u).set({ pass: p, role: "Member", status: "Active", muteUntil: 0, rejoinPending: false });
                alert("Identity Registered. Now login.");
                document.getElementById('toggleBtn').click();
            } else {
                if(data && data.pass === p) {
                    if(data.status === 'Banned') return alert("PERMANENTLY EXILED.");
                    currentUser = { name: u, ...data };
                    if(data.status === 'Kicked') {
                        document.getElementById('authOverlay').style.display = 'none';
                        document.getElementById('kickOverlay').style.display = 'flex';
                        return;
                    }
                    document.getElementById('authOverlay').style.display = 'none';
                    launchCircle();
                } else alert("Access Denied.");
            }
        });
    };

    function launchCircle() {
        document.getElementById('headerInfo').innerText = `${currentUser.name} // ${currentUser.role}`;
        
        rdb.ref('messages').limitToLast(50).on('value', (snap) => {
            const container = document.getElementById('chatContainer');
            container.innerHTML = '';
            snap.forEach(c => {
                const m = c.val();
                const msgId = c.key;
                const div = document.createElement('div');
                div.className = `message msg-${m.role} ${m.sender === currentUser.name ? 'msg-me' : ''}`;
                
                // Show Counts (always visible)
                let countsHTML = '<div>';
                const emotes = { up: '👍', cry: '😢', lol: '😂', heart: '❤️', pray: '🙏' };
                for (let key in emotes) {
                    let count = (m.reactions && m.reactions[key]) ? Object.keys(m.reactions[key]).length : 0;
                    if(count > 0) countsHTML += `<span class="reaction-count-tag">${emotes[key]} ${count}</span>`;
                }
                countsHTML += '</div>';

                // Clickable Drawer
                let drawerHTML = `<div class="reaction-drawer">`;
                for (let [key, emoji] of Object.entries(emotes)) {
                    drawerHTML += `<span class="reaction" onclick="event.stopPropagation(); react('${msgId}', '${key}')">${emoji}</span>`;
                }
                drawerHTML += `</div>`;

                div.innerHTML = `<div style="font-size:0.7em; opacity:0.5; margin-bottom:3px;">${m.sender}</div>
                                 <div>${m.text}</div>${countsHTML}${drawerHTML}`;
                
                div.onclick = () => {
                    document.querySelectorAll('.message').forEach(el => el.classList.remove('active-react'));
                    div.classList.toggle('active-react');
                };

                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        });

        rdb.ref('users').on('value', (snap) => {
            const list = document.getElementById('userList');
            list.innerHTML = '';
            snap.forEach(c => {
                const name = c.key;
                if(name === currentUser.name) return;
                const u = c.val();
                const div = document.createElement('div');
                div.className = 'user-row';
                div.id = 'user-' + name;
                div.innerHTML = `<div style="font-size:0.85em;">${name} <small style="opacity:0.5;">(${u.role})</small></div>`;
                div.onclick = () => { div.classList.remove('notif-glow'); openDM(name); };

                // Hierarchy Protection Logic
                const canAct = (currentUser.role === 'Admin') || (currentUser.role === 'Moderator' && u.role !== 'Admin');

                if(currentUser.role !== 'Member' && canAct) {
                    const tools = document.createElement('div');
                    tools.style.marginTop = "8px";
                    let btnHTML = `<button class="mod-btn" style="background:#daa520" onclick="event.stopPropagation(); mod('mute','${name}')">Mute</button>
                                   <button class="mod-btn" style="background:#ff4500" onclick="event.stopPropagation(); mod('kick','${name}')">Kick</button>`;
                    
                    if(currentUser.role === 'Admin') {
                        btnHTML += `<button class="mod-btn" style="background:#8b0000" onclick="event.stopPropagation(); mod('ban','${name}')">Ban</button>`;
                        
                        // DEMOTE Logic: Visible for Admins looking at ANY Moderator
                        if (u.role === 'Moderator') {
                            btnHTML += `<button class="mod-btn" style="background:#444" onclick="event.stopPropagation(); mod('demote','${name}')">Demote</button>`;
                        } else if (u.role === 'Member') {
                            btnHTML += `<button class="mod-btn" style="background:var(--mod)" onclick="event.stopPropagation(); mod('promote','${name}')">Mod</button>`;
                        }
                    }
                    if(u.rejoinPending) btnHTML += `<button class="mod-btn" style="background:green; width:100%; margin-top:5px;" onclick="event.stopPropagation(); mod('approve','${name}')">Approve</button>`;
                    tools.innerHTML = btnHTML;
                    div.appendChild(tools);
                }
                list.appendChild(div);
            });
        });

        rdb.ref('dms').on('child_changed', (snap) => {
            const roomID = snap.key;
            if (roomID.includes(currentUser.name)) {
                rdb.ref('dms/' + roomID).limitToLast(1).once('child_added', (mSnap) => {
                    const msg = mSnap.val();
                    if (msg.sender !== currentUser.name && activeDMTarget !== msg.sender) {
                        const el = document.getElementById('user-' + msg.sender);
                        if(el) el.classList.add('notif-glow');
                    }
                });
            }
        });

        rdb.ref('users/' + currentUser.name + '/status').on('value', (s) => {
            if(s.val() === 'Kicked' || s.val() === 'Banned') location.reload();
        });
    }

    window.react = (msgId, type) => {
        rdb.ref(`messages/${msgId}/reactions/${type}/${currentUser.name}`).set(true);
        // Hide drawer after reacting
        document.querySelectorAll('.message').forEach(el => el.classList.remove('active-react'));
    };

    window.openDM = function(target) {
        activeDMTarget = target;
        document.getElementById('dmTargetName').innerText = `ENCRYPTED LINK: ${target}`;
        document.getElementById('dmOverlay').style.display = 'flex';
        const roomID = [currentUser.name, target].sort().join('_');
        if(dmListener) rdb.ref('dms/' + roomID).off();
        dmListener = rdb.ref('dms/' + roomID).on('value', (snap) => {
            const container = document.getElementById('dmContainer');
            container.innerHTML = '';
            snap.forEach(c => {
                const m = c.val();
                const div = document.createElement('div');
                div.className = `message ${m.sender === currentUser.name ? 'msg-me' : 'msg-Member'}`;
                div.style.alignSelf = m.sender === currentUser.name ? 'flex-end' : 'flex-start';
                div.innerText = m.text;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        });
    }

    window.closeDM = () => { activeDMTarget = null; document.getElementById('dmOverlay').style.display = 'none'; }
    window.sendDM = function() {
        const text = document.getElementById('dmInput').value.trim();
        if(!text || !activeDMTarget) return;
        const roomID = [currentUser.name, activeDMTarget].sort().join('_');
        rdb.ref('dms/' + roomID).push({ sender: currentUser.name, text: text, time: Date.now() });
        document.getElementById('dmInput').value = '';
    }

    document.getElementById('sendMsgBtn').onclick = () => {
        const text = document.getElementById('messageInput').value.trim();
        if(!text) return;
        rdb.ref('users/' + currentUser.name).once('value', (snap) => {
            if(snap.val().muteUntil > Date.now()) return alert("SILENCED.");
            rdb.ref('messages').push({ sender: currentUser.name, role: currentUser.role, text: text });
            document.getElementById('messageInput').value = '';
        });
    };

    window.mod = (type, target) => {
        const ref = rdb.ref('users/' + target);
        if(type === 'mute') ref.update({ muteUntil: Date.now() + 600000 });
        if(type === 'kick') ref.update({ status: 'Kicked', rejoinPending: false });
        if(type === 'ban') ref.update({ status: 'Banned' });
        if(type === 'promote') ref.update({ role: 'Moderator' });
        if(type === 'demote') ref.update({ role: 'Member' });
        if(type === 'approve') ref.update({ status: 'Active', rejoinPending: false });
    }

    document.getElementById('messageInput').addEventListener('keypress', e => { if(e.key === 'Enter') document.getElementById('sendMsgBtn').click(); });
    document.getElementById('dmInput').addEventListener('keypress', e => { if(e.key === 'Enter') sendDM(); });
};

function requestRejoin() {
    const u = document.getElementById('userIn').value.trim();
    firebase.database().ref('users/' + u).update({ rejoinPending: true });
    document.getElementById('rejoinBtn').disabled = true;
    document.getElementById('requestStatus').innerText = "Signal sent.";
}
</script>
</body>
</html>
